# CI — valida Terraform, roda os testes (com APIs Azure mockadas) e o checkov.
# Não chama Azure/AWS/GCP de verdade: não consome créditos.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt (check)
        run: terraform -chdir=terraform fmt -check -recursive

      - name: terraform init (sem backend)
        run: terraform -chdir=terraform init -backend=false

      - name: terraform validate
        run: terraform -chdir=terraform validate

  test:
    name: Pytest (mock Azure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências de teste
        # pytest + cobertura + rich (usado pela renderização de tabelas, para a
        # cobertura bater com a local). Os SDKs de nuvem são importados dentro das
        # funções e ficam marcados com `pragma: no cover` — não são necessários.
        run: pip install pytest pytest-cov coverage rich

      - name: Rodar testes com cobertura
        run: python -m coverage run -m pytest

      - name: Relatório de cobertura (gate mínimo 90%)
        run: python -m coverage report --fail-under=90

      - name: Conferir badge de cobertura (aviso, não bloqueia)
        run: |
          python scripts/gen_coverage_badge.py
          git diff --quiet docs/coverage.svg \
            || echo "::warning::docs/coverage.svg desatualizado — rode 'make coverage' e commite"

  checkov:
    name: Checkov (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rodar checkov no Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          quiet: true
          soft_fail: true
